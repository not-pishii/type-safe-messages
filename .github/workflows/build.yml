name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: enhanced
      - run: ./gradlew build
